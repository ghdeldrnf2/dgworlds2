<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html,body{
  margin:0;
  width:1280px;
  height:720px;
  background:transparent;
  overflow:hidden;
}

#border{
  position:fixed;
  inset:0;
  box-sizing:border-box;
  border:40px solid rgba(0,0,0,0);
  pointer-events:none;
  transition:border-color .5s;
}

#rttDisplay{
  position:fixed;
  right:30px;
  bottom:20px;
  font-family:Arial,sans-serif;
  font-size:72px;
  font-weight:900;
  color:#ff3030;
  text-shadow:0 0 10px rgba(0,0,0,.8);
  display:none;
  pointer-events:none;
}
</style>
</head>
<body>
<div id="border"></div>
<div id="rttDisplay"></div>

<script>
// 호환성을 위해 var 사용
var config = {
  page: 'https://stats.srt.belabox.net/kuB3M4uQugvgXpcF1OoSSpTslnZf3H',
  key: 'live',
  interval: 2000,
  goodRTT: 100,
  warnRTT: 300
};

function update() {
  var border = document.getElementById('border');
  var rttDisplay = document.getElementById('rttDisplay');
  
  // 구형 브라우저 및 호환성을 위해 XMLHttpRequest 사용
  var xhr = new XMLHttpRequest();
  xhr.open('GET', config.page, true);
  
  xhr.onload = function() {
    if (xhr.status >= 200 && xhr.status < 400) {
      try {
        var j = JSON.parse(xhr.responseText);
        var stats = j.publishers[config.key];
        
        if (!stats || !stats.rtt) {
          border.style.borderColor = 'rgba(255,0,0,0.35)'; // 노란색 불이 들어오게 하고 싶다면 여기를 수정하세요
          return;
        }

        var rtt = Math.round(stats.rtt);

        if (rtt >= 1500) {
          rttDisplay.textContent = rtt + ' RTT';
          rttDisplay.style.display = 'block';
        } else {
          rttDisplay.style.display = 'none';
        }

        if (rtt <= config.goodRTT) {
          border.style.borderColor = 'rgba(0,0,0,0)';
        } else if (rtt <= config.warnRTT) {
          border.style.borderColor = 'rgba(255,255,0,0.25)';
        } else {
          border.style.borderColor = 'rgba(255,0,0,0.35)';
        }
      } catch(e) {
        // 파싱 에러시 테두리를 붉은색 반투명으로 표시 (디버깅용)
        border.style.borderColor = 'rgba(255,0,0,0.5)';
      }
    } else {
      // 서버 에러 발생 시
      border.style.borderColor = 'rgba(255,0,0,0.5)';
    }
  };

  xhr.onerror = function() {
    // CORS 에러 또는 네트워크 연결 실패 시 테두리를 보라색으로 표시해 원인 파악
    border.style.borderColor = 'rgba(128,0,128,0.5)';
  };

  xhr.send();
}

// 최초 실행 및 반복 실행
update();
setInterval(update, config.interval);
</script>
</body>
</html>
