<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100vw;
  height: 100vh;
  background: transparent;
  overflow: hidden;
}

#border {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  box-sizing: border-box;
  border: 40px solid rgba(0,0,0,0);
  pointer-events: none;
  transition: border-color .5s ease-in-out;
}

#rttDisplay {
  position: fixed;
  right: 30px;
  bottom: 20px;
  font-family: Arial, sans-serif;
  font-size: 72px;
  font-weight: 900;
  color: #ff3030;
  text-shadow: 0 0 10px rgba(0,0,0,.8);
  display: none;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="border"></div>
<div id="rttDisplay"></div>

<script>
var config = {
  goodRTT: 100,
  warnRTT: 300
};

// 모블린 앱이 브라우저 위젯으로 실시간 스트림 상태(RTT 등)를 보내줄 때 실행되는 리스너
window.addEventListener("message", function(event) {
  // 모블린이 전달하는 데이터 구조 확인
  if (!event.data || event.data.type !== "moblinStreamStatus") return;
  
  var border = document.getElementById('border');
  var rttDisplay = document.getElementById('rttDisplay');
  if (!border || !rttDisplay) return;

  // 모블린 내부에서 측정된 실시간 RTT 값 가져오기
  var rtt = event.data.rtt;
  if (rtt === undefined || rtt === null) return;
  
  var rttValue = Math.round(rtt);

  // 1. RTT 1500 이상일 때 우측 하단 글씨 표시
  if (rttValue >= 1500) {
    rttDisplay.textContent = rttValue + ' RTT';
    rttDisplay.style.display = 'block';
  } else {
    rttDisplay.style.display = 'none';
  }

  // 2. RTT 값에 따른 테두리 색상 분기
  if (rttValue <= config.goodRTT) {
    border.style.borderColor = 'rgba(0, 0, 0, 0)';       // 정상 (투명)
  } else if (rttValue <= config.warnRTT) {
    border.style.borderColor = 'rgba(255, 255, 0, 0.25)'; // 경고 (노란색)
  } else {
    border.style.borderColor = 'rgba(255, 0, 0, 0.35)';   // 위험 (빨간색)
  }
});
</script>

</body>
</html>
