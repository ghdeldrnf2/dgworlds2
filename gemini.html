<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100vw;
  height: 100vh;
  background: transparent;
  overflow: hidden;
}

#border {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  box-sizing: border-box;
  /* 기본 상태(대기 상태)를 다시 빨간색 반투명으로 설정했습니다 */
  border: 40px solid rgba(255, 0, 0, 0.35);
  pointer-events: none;
  transition: border-color .5s ease-in-out;
}

#rttDisplay {
  position: fixed;
  right: 30px;
  bottom: 20px;
  font-family: Arial, sans-serif;
  font-size: 72px;
  font-weight: 900;
  color: #ff3030;
  text-shadow: 0 0 10px rgba(0,0,0,.8);
  display: none;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="border"></div>
<div id="rttDisplay"></div>

<script>
var config = {
  goodRTT: 100,
  warnRTT: 300
};

// 모블린이 스트림 상태(RTT) 이벤트를 보낼 때 실행되는 리스너
window.addEventListener("message", function(event) {
  // 모블린 데이터가 맞는지 확인
  if (!event.data || event.data.type !== "moblinStreamStatus") return;
  
  var border = document.getElementById('border');
  var rttDisplay = document.getElementById('rttDisplay');
  if (!border || !rttDisplay) return;

  var rtt = event.data.rtt;
  
  // 데이터가 정상적으로 들어오지 않는 대기 상태라면 기본값인 빨간색 유지
  if (rtt === undefined || rtt === null || isNaN(rtt)) {
    border.style.borderColor = 'rgba(255, 0, 0, 0.35)';
    rttDisplay.style.display = 'none';
    return;
  }
  
  var rttValue = Math.round(rtt);

  // 1. RTT 1500 이상일 때 우측 하단 글자 표시 여부
  if (rttValue >= 1500) {
    rttDisplay.textContent = rttValue + ' RTT';
    rttDisplay.style.display = 'block';
  } else {
    rttDisplay.style.display = 'none';
  }

  // 2. 실제 모블린 수치에 따른 실시간 테두리 변화
  if (rttValue <= config.goodRTT) {
    border.style.borderColor = 'rgba(0, 0, 0, 0)';       // 정상 송출 중 (투명)
  } else if (rttValue <= config.warnRTT) {
    border.style.borderColor = 'rgba(255, 255, 0, 0.25)'; // 경고 (노란색)
  } else {
    border.style.borderColor = 'rgba(255, 0, 0, 0.35)';   // 위험 (빨간색)
  }
});
</script>

</body>
</html>
