<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline'; connect-src * 'unsafe-inline';">
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 1280px;
  height: 720px;
  background: transparent;
  overflow: hidden;
}

#border {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  box-sizing: border-box;
  border: 40px solid rgba(0,0,0,0);
  pointer-events: none;
  transition: border-color .5s;
}

#rttDisplay {
  position: fixed;
  right: 30px;
  bottom: 20px;
  font-family: Arial, sans-serif;
  font-size: 72px;
  font-weight: 900;
  color: #ff3030;
  text-shadow: 0 0 10px rgba(0,0,0,.8);
  display: none;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="border"></div>
<div id="rttDisplay"></div>

<script>
var config = {
  page: 'https://stats.srt.belabox.net/kuB3M4uQugvgXpcF1OoSSpTslnZf3H',
  key: 'live',
  interval: 2000,
  goodRTT: 100,
  warnRTT: 300
};

function update() {
  var border = document.getElementById('border');
  var rttDisplay = document.getElementById('rttDisplay');
  if (!border || !rttDisplay) return;

  var xhr = new XMLHttpRequest();
  xhr.open('GET', config.page, true);
  
  xhr.onload = function() {
    if (xhr.status >= 200 && xhr.status < 400) {
      try {
        var j = JSON.parse(xhr.responseText);
        var stats = j.publishers[config.key];
        if (!stats || stats.rtt === undefined) return;

        var rtt = Math.round(stats.rtt);

        // 텍스트 표시 제어
        rttDisplay.style.display = (rtt >= 1500) ? 'block' : 'none';
        if (rtt >= 1500) rttDisplay.textContent = rtt + ' RTT';

        // 테두리 색상 제어
        if (rtt <= config.goodRTT) {
          border.style.borderColor = 'rgba(0,0,0,0)';
        } else if (rtt <= config.warnRTT) {
          border.style.borderColor = 'rgba(255,255,0,0.25)';
        } else {
          border.style.borderColor = 'rgba(255,0,0,0.35)';
        }
      } catch(e) {}
    }
  };

  xhr.send();
}

update();
setInterval(update, config.interval);
</script>

</body>
</html>
