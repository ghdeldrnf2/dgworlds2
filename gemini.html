<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline';">
<style>
html,body{
  margin:0;
  width:1280px;
  height:720px;
  background:transparent;
  overflow:hidden;
}

#border{
  position:fixed;
  inset:0;
  box-sizing:border-box;
  border:40px solid rgba(0,0,0,0);
  pointer-events:none;
  transition:border-color .5s;
}

#rttDisplay{
  position:fixed;
  right:30px;
  bottom:20px;
  font-family:Arial,sans-serif;
  font-size:72px;
  font-weight:900;
  color:#ff3030;
  text-shadow:0 0 10px rgba(0,0,0,.8);
  display:none;
  pointer-events:none;
}

/* 디버깅용 에러 메시지 스타일 */
#debugLog {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: red;
  background: rgba(0,0,0,0.8);
  padding: 20px;
  font-size: 24px;
  font-family: sans-serif;
  z-index: 9999;
  display: none;
}
</style>
</head>
<body>
<div id="border"></div>
<div id="rttDisplay"></div>
<div id="debugLog"></div> <script>
var config = {
  page: 'https://stats.srt.belabox.net/kuB3M4uQugvgXpcF1OoSSpTslnZf3H',
  key: 'live',
  interval: 2000,
  goodRTT: 100,
  warnRTT: 300
};

function showDebug(msg) {
  var log = document.getElementById('debugLog');
  log.style.display = 'block';
  log.textContent = '[Moblin Error] ' + msg;
}

function update() {
  var border = document.getElementById('border');
  var rttDisplay = document.getElementById('rttDisplay');
  
  var xhr = new XMLHttpRequest();
  xhr.open('GET', config.page, true);
  
  xhr.onload = function() {
    if (xhr.status >= 200 && xhr.status < 400) {
      try {
        var j = JSON.parse(xhr.responseText);
        var stats = j.publishers[config.key];
        
        if (!stats || !stats.rtt) {
          border.style.borderColor = 'rgba(255,0,0,0.35)';
          return;
        }

        var rtt = Math.round(stats.rtt);

        if (rtt >= 1500) {
          rttDisplay.textContent = rtt + ' RTT';
          rttDisplay.style.display = 'block';
        } else {
          rttDisplay.style.display = 'none';
        }

        if (rtt <= config.goodRTT) {
          border.style.borderColor = 'rgba(0,0,0,0)';
        } else if (rtt <= config.warnRTT) {
          border.style.borderColor = 'rgba(255,255,0,0.25)';
        } else {
          border.style.borderColor = 'rgba(255,0,0,0.35)';
        }
      } catch(e) {
        showDebug('JSON 파싱 실패: ' + e.message);
      }
    } else {
      showDebug('서버 응답 에러 (Status: ' + xhr.status + ')');
    }
  };

  xhr.onerror = function() {
    showDebug('네트워크/CORS 차단 발생! 모블린 앱 설정을 확인하세요.');
  };

  xhr.send();
}

update();
setInterval(update, config.interval);
</script>
</body>
</html>
